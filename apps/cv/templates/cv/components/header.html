{% load static %}

{% load ext_links %}

<header class="cv-header pt-2 pt-md-0">
  <div class="media flex-column flex-md-row">
    <div class="media-body p-3 d-flex flex-column flex-md-row mx-auto mx-lg-0">
      <div class="primary-info">
        <h1 class="name mt-0 mb-3 text-white">Wayne Lambert</h1>
        <ul class="list-unstyled">
          <li class="mb-2">
            <i class="fas fa-map-marker-alt fa-fw fa-lg mr-2"></i>
            <a href="{% google_maps_location_link %}" target="_blank" rel="noreferrer">
              <span class="text-white">Peterborough, UK</span>
            </a>
          </li>
          <li class="mb-2">
            <i class="far fa-envelope fa-fw fa-lg mr-2" data-fa-transform="grow-3"></i>
            <a href="{% email_me_link %}">
              <span class="text-white">wayne.a.lambert@gmail.com</span>
            </a>
          </li>
          <li>
            <i class="fas fa-mobile-alt fa-fw fa-lg mr-2" data-fa-transform="grow-6"></i>
            <span class="text-white">+44 7950 315504</span>
          </li>
        </ul>
      </div>

      <div class="secondary-info ml-md-auto mt-4 pr-2">
        <ul class="list-unstyled pt-4">
          <li class="mb-2">
            <span class="fa-container text-center text-white mr-3">
              <i class="fas fa-globe"></i>
            </span>
            <a href="{% url 'pages:home' %}" target="_blank">
              <span class="text-white">waynelambert.dev</span>
            </a>
          </li>
          <li class="mb-2">
            <span class="fa-container text-center text-white mr-3">
              <i class="fab fa-github-alt fa-fw"></i>
            </span>
            <a href="{% github_profile_link %}" target="_blank" rel="noreferrer">
              <span class="text-white">github.com/WayneLambert</span>
            </a>
          </li>
          <li class="mb-2">
            <span class="fa-container text-center text-white mr-3">
              <i class="fab fa-linkedin-in fa-fw"></i>
            </span>
            <a href="{% linkedin_profile_link %}" target="_blank" rel="noreferrer">
              <span class="text-white">linkedin.com/in/waynelambert/</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
